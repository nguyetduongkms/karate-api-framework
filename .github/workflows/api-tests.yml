name: API Tests
on:
  push:
    branches:
      - main
      - feat-github_action_CI
  schedule:
    - cron: '0 3 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven tests
        env:
          DEMO_USERNAME: ${{ secrets.DEMO_USERNAME }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          NEW_USER_PASSWORD: ${{ secrets.NEW_USER_PASSWORD }}
          EXISTING_USERNAME: ${{ secrets.EXISTING_USERNAME }}
          EXISTING_PASSWORD: ${{ secrets.EXISTING_PASSWORD }}
          EXISTING_EMAIL: ${{ secrets.EXISTING_EMAIL }}
        run: mvn clean test

      - name: Upload Cucumber Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: target/cucumber-html-reports/
          retention-days: 14

      - run: echo "The report is generated successfully!"
      - run: echo "🍏 This job's status is ${{ job.status }}."